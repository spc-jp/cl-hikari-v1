                    const el = document.createElement('textarea');
                    el.value = str;
                    el.setAttribute('readonly', '');
                    el.style.position = 'absolute';
                    el.style.left = '-9999px';
                    document.body.appendChild(el);
                    
                    const selected = 
                        document.getSelection().rangeCount > 0 
                            ? document.getSelection().getRangeAt(0) 
                            : false;
                    el.select();
                    
                    let successful = false;
                    try {
                        successful = document.execCommand('copy');
                    } catch (err) {
                        console.error('Fallback copy failed', err);
                    }
                    
                    document.body.removeChild(el);
                    if (selected) {
                        document.getSelection().removeAllRanges();
                        document.getSelection().addRange(selected);
                    }
                    return successful;
                };

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(showSuccess)
                        .catch(err => {
                            console.warn("Clipboard API failed, using fallback", err);
                            if(copyToClipboardFallback(text)) {
                                showSuccess();
                            } else {

                        });

                                        <div className="w-full bg-white dark:bg-gray-800 p-4 rounded border border-slate-100 dark:border-gray-600 whitespace-pre-wrap text-sm leading-relaxed">
                                            {generatedText.insta || <span className="text-gray-400">内容を生成してください...</span>}
                                        </div>
                                        {selectedImage && (
                                            <div className="w-full max-w-sm mx-auto aspect-square bg-slate-100 dark:bg-gray-700 rounded-lg overflow-hidden border border-slate-200 dark:border-gray-600">
                                                <img src={selectedImage.url} alt="Preview" className="w-full h-full object-cover" />
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'fb' && (
                                <div className={`p-4 ${isGenerating ? 'opacity-50' : 'animate-fade-in'}`}>
                                    <div className="bg-hikari-base dark:bg-gray-800 p-4 rounded border border-slate-200 dark:border-gray-600 whitespace-pre-wrap text-sm leading-relaxed mb-4">
                                        {generatedText.fb || <span className="text-gray-400">内容を生成してください...</span>}
                                    </div>
                                    {selectedImage && (
                                        <div className="mb-4 rounded-lg overflow-hidden border border-slate-200 dark:border-gray-600">
                                            <img src={selectedImage.url} alt="FB Preview" className="w-full h-48 object-cover" />
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'x' && (
                                <div className={`p-4 ${isGenerating ? 'opacity-50' : 'animate-fade-in'}`}>
                                    <div className="bg-hikari-base dark:bg-gray-800 p-4 rounded border border-slate-200 dark:border-gray-600 whitespace-pre-wrap text-sm leading-relaxed mb-2">
                                        {generatedText.x || <span className="text-gray-400">内容を生成してください...</span>}
                                    </div>
                                    <div className="mt-2 mb-4 text-right text-xs opacity-60">
                                        {generatedText.x.length} 文字
                                    </div>
                                    {selectedImage && (
                                        <div className="mb-4 rounded-xl overflow-hidden border border-slate-200 dark:border-gray-600">
                                            <img src={selectedImage.url} alt="X Preview" className="w-full h-48 object-cover" />
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* Reply Tab Content */}
                            {activeTab === 'reply' && (
                                <div className="animate-fade-in">
                                    <div className="bg-green-50 dark:bg-green-900/20 px-4 py-3 border-b border-green-100 dark:border-green-800/30 flex items-center gap-2">
                                        <MessageCircle size={18} className="text-green-600 dark:text-green-400" />
                                        <span className="font-bold text-sm text-green-800 dark:text-green-200">コメントへの返信例</span>
                                    </div>
                                    {renderReplyExamples()}
                                </div>
                            )}

                            {/* Image Selection Area (Show for all tabs) */}
                            {renderImageSelection()}

                        </div>
                    </div>
                    </div>
                </div>

                {isHelpOpen && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-hikari-darkCard w-full max-w-md rounded-2xl shadow-xl overflow-hidden animate-fade-in max-h-[90vh] flex flex-col">
                            <div className="p-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center shrink-0">
                                <h3 className="font-bold text-lg flex items-center gap-2">
                                    <HelpCircle className="text-hikari-accent" />
                                    使い方ガイド
                                </h3>
                                <button onClick={() => setIsHelpOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={24}/></button>
                            </div>
                            <div className="p-6 space-y-6 overflow-y-auto">
                                <div className="text-sm opacity-80 bg-blue-50 dark:bg-gray-700 p-3 rounded-lg border border-blue-100 dark:border-gray-600">
                                    <span className="font-bold text-blue-800 dark:text-blue-200">【コンセプト】</span><br/>
                                    このアプリは、日々の投稿を通じて「光製薬の信頼」を積み重ねるためのSNS作成サポートツールです。
                                </div>
                                
                                <div className="space-y-5">
                                    <div className="flex gap-4 relative">
                                        {/* 線をつなぐ装飾 */}
                                        <div className="absolute left-[15px] top-8 bottom-[-20px] w-0.5 bg-gray-200 dark:bg-gray-600 last:hidden"></div>
                                        
                                        <div className="bg-hikari-accent text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 z-10 shadow-sm text-sm">1</div>
                                        <div>
                                            <h4 className="font-bold text-sm text-gray-800 dark:text-gray-200">「時期」と「ターゲット」を決める</h4>
                                            <p className="text-xs text-gray-600 dark:text-gray-400 mt-1 leading-relaxed">
                                                STEP1と2で、投稿月と誰に向けた発信かを選びます。これだけで最適な「季節の挨拶」と「ブランドメッセージ」が自動設定されます。
                                            </p>
                                        </div>
                                    </div>

                                    <div className="flex gap-4 relative">
                                        <div className="absolute left-[15px] top-8 bottom-[-20px] w-0.5 bg-gray-200 dark:bg-gray-600"></div>
                                        <div className="bg-hikari-accent text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 z-10 shadow-sm text-sm">2</div>
                                        <div>
                                            <h4 className="font-bold text-sm text-gray-800 dark:text-gray-200">「テーマ」と「想い」を選ぶ</h4>
                                            <p className="text-xs text-gray-600 dark:text-gray-400 mt-1 leading-relaxed">
                                                STEP3で発信のテーマを選ぶと、おすすめのハッシュタグと画像候補が変わります。さらに「伝えたい想い」を選ぶと、プロ品質の文章ベースが入力欄にセットされます。
                                            </p>
                                        </div>
                                    </div>

                                    <div className="flex gap-4 relative">
                                        <div className="absolute left-[15px] top-8 bottom-[-20px] w-0.5 bg-gray-200 dark:bg-gray-600"></div>
                                        <div className="bg-hikari-accent text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 z-10 shadow-sm text-sm">3</div>
                                        <div>
                                            <h4 className="font-bold text-sm text-gray-800 dark:text-gray-200">内容を整えて「更新」する</h4>
                                            <p className="text-xs text-gray-600 dark:text-gray-400 mt-1 leading-relaxed">
                                                入力欄の文章に、具体的な行事名などを自由に追記して整えます。<span className="font-bold">「内容を更新する」</span>ボタンを押すと、すべての要素が組み合わさった投稿文が完成します。
                                            </p>
                                        </div>
                                    </div>

                                    <div className="flex gap-4 relative">
                                        <div className="bg-hikari-accent text-white w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 z-10 shadow-sm text-sm">4</div>
                                        <div>
                                            <h4 className="font-bold text-sm text-gray-800 dark:text-gray-200">プレビューを確認してコピー</h4>
                                            <p className="text-xs text-gray-600 dark:text-gray-400 mt-1 leading-relaxed">
                                                右側のSTEP4で仕上がりを確認します。Instagram、Facebook、Xなどの各SNSに最適化された文章をコピーして、そのまま投稿にご活用ください。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="p-4 bg-gray-50 dark:bg-gray-800 text-center shrink-0 border-t border-gray-100 dark:border-gray-700">
                                <button onClick={() => setIsHelpOpen(false)} className="w-full py-2 bg-gray-800 dark:bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-bold transition-colors">作成をはじめる</button>
                            </div>
                        </div>
                    </div>
                )}

                {isSettingsOpen && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                        <div className="bg-white dark:bg-hikari-darkCard w-full max-w-lg rounded-2xl shadow-xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-5 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
                                <h3 className="font-bold text-lg flex items-center gap-2">
                                    <Settings className="text-gray-500" />
                                    設定・カスタマイズ
                                </h3>
                                <button onClick={() => setIsSettingsOpen(false)} className="text-gray-400 hover:text-gray-600"><X size={24}/></button>
                            </div>
                            
                            <div className="p-6 space-y-6 overflow-y-auto">
                                
                                <div className="flex justify-between items-center pb-4 border-b border-gray-100 dark:border-gray-700">
                                    <div className="flex items-center gap-2">
                                        {isDarkMode ? <Moon size={20} className="text-yellow-400"/> : <Sun size={20} className="text-orange-400"/>}
                                        <span className="font-bold text-sm">ダークモード切替</span>
                                    </div>
                                    <button 
                                        onClick={() => setIsDarkMode(!isDarkMode)}
                                        className={`w-12 h-6 rounded-full p-1 transition-colors ${isDarkMode ? 'bg-blue-600' : 'bg-gray-300'}`}
                                    >
                                        <div className={`bg-white w-4 h-4 rounded-full shadow-md transform transition-transform ${isDarkMode ? 'translate-x-6' : 'translate-x-0'}`} />
                                    </button>
                                </div>

                                <div className="flex justify-between items-center pb-4 border-b border-gray-100 dark:border-gray-700">
                                    <div>
                                        <p className="font-bold text-sm">季節の挨拶文</p>
                                        <p className="text-xs opacity-60">自動挿入される時候の挨拶をON/OFFします</p>
                                    </div>
                                    <button 
                                        onClick={() => setShowGreeting(!showGreeting)}
                                        className={`w-12 h-6 rounded-full p-1 transition-colors ${showGreeting ? 'bg-hikari-accent' : 'bg-gray-300'}`}
                                    >
                                        <div className={`bg-white w-4 h-4 rounded-full shadow-md transform transition-transform ${showGreeting ? 'translate-x-6' : 'translate-x-0'}`} />
                                    </button>
                                </div>

                                <div className="space-y-4 pt-2 border-t border-gray-100 dark:border-gray-700">
                                    <h4 className="font-bold text-sm flex items-center gap-2 text-hikari-accent">
                                        <Calendar size={16} /> 会社休日・行事設定
                                    </h4>
                                    
                                    <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg space-y-3">
                                        <div className="flex items-center gap-2 mb-1">
                                            <Building size={16} className="text-gray-500" />
                                            <span className="text-xs font-bold">本社 休暇設定</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">夏季休暇 開始</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.hq.summer.start}
                                                    onChange={(e) => handleHolidayChange('hq', 'summer', 'start', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">終了</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.hq.summer.end}
                                                    onChange={(e) => handleHolidayChange('hq', 'summer', 'end', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">冬季休暇 開始</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.hq.winter.start}
                                                    onChange={(e) => handleHolidayChange('hq', 'winter', 'start', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">終了</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.hq.winter.end}
                                                    onChange={(e) => handleHolidayChange('hq', 'winter', 'end', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 dark:bg-gray-800 p-3 rounded-lg space-y-3">
                                        <div className="flex items-center gap-2 mb-1">
                                            <Factory size={16} className="text-gray-500" />
                                            <span className="text-xs font-bold">工場 休暇設定</span>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">夏季休暇 開始</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.factory.summer.start}
                                                    onChange={(e) => handleHolidayChange('factory', 'summer', 'start', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">終了</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.factory.summer.end}
                                                    onChange={(e) => handleHolidayChange('factory', 'summer', 'end', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">冬季休暇 開始</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.factory.winter.start}
                                                    onChange={(e) => handleHolidayChange('factory', 'winter', 'start', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-bold block mb-1">終了</label>
                                                <input 
                                                    type="date" 
                                                    value={holidaySettings.factory.winter.end}
                                                    onChange={(e) => handleHolidayChange('factory', 'winter', 'end', e.target.value)}
                                                    className="w-full p-1 text-xs border rounded dark:bg-gray-700 dark:border-gray-600"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Link Settings */}
                                <div className="space-y-3 pt-2 border-t border-gray-100 dark:border-gray-700">
                                    <h4 className="font-bold text-sm flex items-center gap-2 text-hikari-accent">
                                        <Link size={16} /> リンク設定
                                    </h4>
                                    <div>
                                        <label className="text-[10px] font-bold block mb-1">リンク先のURL (お客様のURL)</label>
                                        <input 
                                            type="text" 
                                            value={customLinkUrl}
                                            onChange={(e) => setCustomLinkUrl(e.target.value)}
                                            className="w-full p-2 border bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-1 focus:ring-hikari-accent outline-none"
                                            placeholder="https://..."
                                        />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold block mb-1">表示させるURL (投稿用テキスト)</label>
                                        <input 
                                            type="text" 
                                            value={customLinkText}
                                            onChange={(e) => setCustomLinkText(e.target.value)}
                                            className="w-full p-2 border bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-1 focus:ring-hikari-accent outline-none"
                                            placeholder="例：詳しくはプロフィールのリンクへ"
                                        />
                                        <p className="text-[10px] opacity-60 mt-1">※Instagramの投稿文末尾に表示されます</p>
                                    </div>
                                </div>

                                <div className="space-y-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                                    <label className="font-bold text-sm block">署名（フッター）の編集</label>
                                    <textarea 
                                        value={signature}
                                        onChange={(e) => setSignature(e.target.value)}
                                        className="w-full p-3 border bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 rounded-lg text-sm h-24 resize-none focus:ring-1 focus:ring-hikari-accent outline-none"
                                    />
                                    <p className="text-xs opacity-60">※Facebook投稿の末尾に挿入されます</p>
                                </div>

                                <div className="space-y-2">
                                    <label className="font-bold text-sm block">簡易NGワード登録</label>
                                    <input 
                                        type="text"
                                        value={ngWordsStr}
                                        onChange={(e) => setNgWordsStr(e.target.value)}
                                        className="w-full p-3 border bg-gray-50 dark:bg-gray-800 border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-1 focus:ring-hikari-accent outline-none"
                                        placeholder="カンマ(,)区切りで入力"
                                    />
                                    <p className="text-xs opacity-60">入力内容に含まれると警告を表示します</p>
                                </div>

                            </div>
                            <div className="p-4 bg-gray-50 dark:bg-gray-800 text-center border-t border-gray-100 dark:border-gray-700">
                                <button onClick={() => setIsSettingsOpen(false)} className="px-8 py-2 bg-gray-800 dark:bg-gray-600 text-white rounded-lg font-bold hover:bg-gray-700">閉じる</button>
                            </div>
                        </div>
                    </div>
                )}
                
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HikariBrandNote />);
    </script>
</body>
</html>
